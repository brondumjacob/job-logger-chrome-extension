<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Logger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f8fafc;
    }
    
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2e5a8f 100%);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .header button {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .header button:hover {
      background: rgba(255,255,255,0.3);
    }
    
    .content {
      padding: 16px;
    }
    
    .form-group {
      margin-bottom: 14px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    
    .form-group label .required {
      color: #ef4444;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #2e5a8f;
      box-shadow: 0 0 0 3px rgba(46, 90, 143, 0.1);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }
    
    .form-row {
      display: flex;
      gap: 12px;
    }
    
    .form-row .form-group {
      flex: 1;
    }
    
    .market-range {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      color: #0369a1;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .market-range svg {
      width: 16px;
      height: 16px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2e5a8f 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 0.1s, box-shadow 0.2s;
      margin-top: 16px;
    }
    
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3);
    }
    
    .submit-btn:active {
      transform: translateY(0);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Setup Screen */
    .setup-screen {
      padding: 24px;
      text-align: center;
    }
    
    .setup-screen h2 {
      font-size: 20px;
      color: #1e3a5f;
      margin-bottom: 8px;
    }
    
    .setup-screen p {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 24px;
    }
    
    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    
    .google-btn:hover {
      background: #f9fafb;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .google-btn img {
      width: 20px;
      height: 20px;
    }
    
    .privacy-note {
      margin-top: 16px;
      font-size: 12px;
      color: #9ca3af;
    }
    
    /* Success Toast */
    .toast {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      background: #059669;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    
    /* Duplicate Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    
    .modal {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 320px;
      width: 100%;
    }
    
    .modal h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      color: #b45309;
      margin-bottom: 12px;
    }
    
    .modal p {
      font-size: 14px;
      color: #4b5563;
      margin-bottom: 16px;
    }
    
    .modal .existing-info {
      background: #f9fafb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    
    .modal .existing-info div {
      margin-bottom: 4px;
    }
    
    .modal .existing-info strong {
      color: #374151;
    }
    
    .modal-buttons {
      display: flex;
      gap: 8px;
    }
    
    .modal-buttons button {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .modal-buttons .cancel-btn {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      color: #374151;
    }
    
    .modal-buttons .cancel-btn:hover {
      background: #e5e7eb;
    }
    
    .modal-buttons .update-btn {
      background: #2e5a8f;
      border: none;
      color: white;
    }
    
    .modal-buttons .update-btn:hover {
      background: #1e3a5f;
    }
    
    /* Settings Panel */
    .settings-panel {
      padding: 16px;
    }
    
    .settings-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #2e5a8f;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      background: none;
      border: none;
    }
    
    .settings-section {
      margin-bottom: 20px;
    }
    
    .settings-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .settings-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
    }
    
    .settings-card .sheet-info {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .settings-card .sheet-icon {
      width: 32px;
      height: 32px;
      background: #34a853;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }
    
    .settings-card .sheet-name {
      font-weight: 500;
      color: #374151;
    }
    
    .settings-card .sheet-sync {
      font-size: 12px;
      color: #9ca3af;
    }
    
    .settings-card .sheet-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    
    .settings-card .sheet-actions button {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    
    .sheet-actions .open-btn {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      color: #0369a1;
    }
    
    .sheet-actions .disconnect-btn {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
    }
    
    /* Loading state */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
    
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2e5a8f;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Auto-detected badge */
    .auto-detected {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #dcfce7;
      color: #166534;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="../src/popup/index.jsx"></script>
</body>
</html>
