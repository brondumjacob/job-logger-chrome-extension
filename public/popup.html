<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Application Logger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
    }
    
    .header {
      background: linear-gradient(135deg, #1e3a5f 0%, #2e5a8f 100%);
      color: white;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .header h1 { font-size: 16px; font-weight: 600; }
    
    .content { padding: 16px; }
    
    .form-group { margin-bottom: 14px; }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    
    .form-group label .required { color: #ef4444; }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #2e5a8f;
      box-shadow: 0 0 0 3px rgba(46, 90, 143, 0.1);
    }
    
    .form-row { display: flex; gap: 12px; }
    .form-row .form-group { flex: 1; }
    
    .auto-badge {
      display: inline-block;
      background: #dcfce7;
      color: #166534;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 6px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e3a5f 0%, #2e5a8f 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    
    .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 58, 95, 0.3);
    }
    
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .google-btn {
      width: 100%;
      padding: 12px;
      background: white;
      color: #374151;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .google-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }
    
    .google-icon {
      width: 18px;
      height: 18px;
    }
    
    .warning-banner {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #92400e;
    }
    
    .success-banner {
      background: #dcfce7;
      border: 1px solid #22c55e;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #166534;
    }
    
    .error-banner {
      background: #fee2e2;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #991b1b;
    }
    
    .connected-banner {
      background: #dbeafe;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1e40af;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .disconnect-link {
      color: #1e40af;
      text-decoration: underline;
      cursor: pointer;
      font-size: 12px;
    }
    
    .status-text {
      text-align: center;
      color: #6b7280;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📋 Job Application Logger</h1>
  </div>
  
  <div class="content">
    <!-- Auth section - shown when not connected -->
    <div id="auth-section" style="display: none;">
      <div class="warning-banner">
        ⚠️ Connect to Google Sheets to save your applications.
      </div>
      <button id="google-signin-btn" class="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    </div>
    
    <!-- Connected banner - shown when connected -->
    <div id="connected-banner" class="connected-banner" style="display: none;">
      <span>✓ Connected to Google Sheets</span>
      <span id="disconnect-link" class="disconnect-link">Disconnect</span>
    </div>
    
    <!-- Error banner -->
    <div id="error-banner" class="error-banner" style="display: none;"></div>
    
    <!-- Success banner -->
    <div id="success-banner" class="success-banner" style="display: none;">
      ✓ Application logged successfully!
    </div>
    
    <form id="job-form">
      <div class="form-group">
        <label>Company <span class="required">*</span> <span id="company-badge" class="auto-badge" style="display:none;">✓ Auto-detected</span></label>
        <input type="text" id="company" placeholder="e.g. Acme Corp" required>
      </div>
      
      <div class="form-group">
        <label>Role <span class="required">*</span> <span id="role-badge" class="auto-badge" style="display:none;">✓ Auto-detected</span></label>
        <input type="text" id="role" placeholder="e.g. Fund Accountant" required>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Salary</label>
          <input type="text" id="salary" placeholder="e.g. $90,000">
        </div>
        <div class="form-group">
          <label>Location <span id="location-badge" class="auto-badge" style="display:none;">✓</span></label>
          <input type="text" id="location" placeholder="e.g. Chicago, IL">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Work Arrangement</label>
          <select id="workArrangement">
            <option value="">Select...</option>
            <option value="Remote">Remote</option>
            <option value="Hybrid">Hybrid</option>
            <option value="On-site">On-site</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="Applied">Applied</option>
            <option value="Not Yet Applied">Not Yet Applied</option>
            <option value="Phone Screen">Phone Screen</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Tier</label>
          <select id="tier">
            <option value="Tier 2">Tier 2</option>
            <option value="Tier 1">Tier 1</option>
            <option value="Tier 3">Tier 3</option>
          </select>
        </div>
        <div class="form-group">
          <label>Source <span id="source-badge" class="auto-badge" style="display:none;">✓</span></label>
          <select id="source">
            <option value="">Select...</option>
            <option value="LinkedIn">LinkedIn</option>
            <option value="Indeed">Indeed</option>
            <option value="Greenhouse">Greenhouse</option>
            <option value="Lever">Lever</option>
            <option value="Glassdoor">Glassdoor</option>
            <option value="Company Website">Company Website</option>
            <option value="Recruiter">Recruiter</option>
            <option value="Referral">Referral</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="notes" placeholder="Any notes...">
      </div>
      
      <button type="submit" class="submit-btn" id="submit-btn">📝 Log Application</button>
      <p class="status-text" id="status-text"></p>
    </form>
  </div>

  <script src="popup.js"></script>
</body>
</html>
